[[mods]]
    modId = "ae2lp"
    version = "1.3.0"
    displayName = "AE2 Layered Packager"
    logoFile = ""
    credits = "ae2lp"
    authors = "ae2lp"
    description = '''
AE2 Layered Packager

A client-side mod that provides multi-pattern encoding for layered GregTech recipes
using AE2 storage cells. Also includes a future packager block for item/fluid packaging.

Features:
- Auto-encode layered GT recipes into multiple AE2 patterns
- Uses storage cells (expandedae dual cells or AE2 vanilla cells) as intermediate buffers
- Step-by-step pattern generation with capacity-aware cell allocation
'''

